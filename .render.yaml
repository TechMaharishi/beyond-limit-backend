services:
  - type: web
    name: byl-backend
    runtime: node
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    envVars:
      # Required runtime port; Express reads `process.env.PORT`
      - key: PORT
        value: "5000"

      # Set production mode for Render
